id = "smf28_phase_gain_tilt_smoke"
description = "Smoke front-layer config: tiny single-mode phase plus experimental one-parameter gain-tilt control."
maturity = "experimental"
output_root = "results/raman/smoke"
output_tag = "smf28_phase_gain_tilt_smoke"
save_prefix_basename = "opt"

[problem]
regime = "single_mode"
preset = "SMF28"
L_fiber = 0.05
P_cont = 0.001
beta_order = 3
Nt = 1024
time_window = 5.0
grid_policy = "auto_if_undersized"
pulse_fwhm = 1.85e-13
pulse_rep_rate = 8.05e7
pulse_shape = "sech_sq"
raman_threshold = -5.0

[controls]
variables = ["phase", "gain_tilt"]
parameterization = "full_grid"
initialization = "zero"
policy = "direct"

[objective]
kind = "raman_band"
log_cost = true

[[objective.regularizer]]
name = "gdd"
lambda = 1.0e-4

[[objective.regularizer]]
name = "boundary"
lambda = 1.0

[[objective.regularizer]]
name = "energy"
lambda = 1.0

[solver]
kind = "lbfgs"
max_iter = 5
validate_gradient = false
store_trace = true
f_abstol = 1.0e-3
g_abstol = "auto"

[artifacts]
bundle = "experimental_multivar"
save_payload = true
save_sidecar = true
update_manifest = false
write_trust_report = false
write_standard_images = true
export_phase_handoff = false

[verification]
mode = "standard"
block_on_failed_checks = true
gradient_check = false
taylor_check = false
exact_grid_replay = false
artifact_validation = true

[export]
enabled = false
profile = "neutral_csv_v1"
include_unwrapped_phase = true
include_group_delay = true
