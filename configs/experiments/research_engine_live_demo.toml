id = "smf28_phase_live_demo"
description = "Live-demo config: short supported single-mode phase-only Raman run with neutral CSV handoff export."
maturity = "supported"
output_root = "results/raman/demo"
output_tag = "smf28_phase_live_demo"
save_prefix_basename = "opt"

[problem]
regime = "single_mode"
preset = "SMF28"
L_fiber = 2.0
P_cont = 0.2
beta_order = 3
Nt = 2048
time_window = 12.0
grid_policy = "auto_if_undersized"
pulse_fwhm = 1.85e-13
pulse_rep_rate = 8.05e7
pulse_shape = "sech_sq"
raman_threshold = -5.0

[controls]
variables = ["phase"]
parameterization = "full_grid"
initialization = "zero"

[objective]
kind = "raman_band"
log_cost = true

[[objective.regularizer]]
name = "gdd"
lambda = "auto"

[[objective.regularizer]]
name = "boundary"
lambda = 1.0

[solver]
kind = "lbfgs"
max_iter = 10
validate_gradient = false
store_trace = true
f_abstol = 1.0e-5
g_abstol = "auto"

[artifacts]
bundle = "standard"
save_payload = true
save_sidecar = true
update_manifest = true
write_trust_report = true
write_standard_images = true
export_phase_handoff = true

[verification]
mode = "standard"
block_on_failed_checks = true
gradient_check = false
taylor_check = false
exact_grid_replay = false
artifact_validation = true

[export]
enabled = true
profile = "neutral_csv_v1"
include_unwrapped_phase = true
include_group_delay = true
