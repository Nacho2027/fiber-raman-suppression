id = "smf28_phase_smoke"
description = "Smoke front-layer config: tiny single-mode phase-only run for CLI/artifact verification."
maturity = "supported"
output_root = "results/raman/smoke"
output_tag = "smf28_phase_smoke"
save_prefix_basename = "opt"

[problem]
regime = "single_mode"
preset = "SMF28"
L_fiber = 0.05
P_cont = 0.001
beta_order = 3
Nt = 1024
time_window = 5.0
grid_policy = "auto_if_undersized"
pulse_fwhm = 1.85e-13
pulse_rep_rate = 8.05e7
pulse_shape = "sech_sq"
raman_threshold = -5.0

[controls]
variables = ["phase"]
parameterization = "full_grid"
initialization = "zero"

[objective]
kind = "raman_band"
log_cost = true

[[objective.regularizer]]
name = "gdd"
lambda = "auto"

[[objective.regularizer]]
name = "boundary"
lambda = 1.0

[solver]
kind = "lbfgs"
max_iter = 1
validate_gradient = false
store_trace = true

[artifacts]
bundle = "standard"
save_payload = true
save_sidecar = true
update_manifest = true
write_trust_report = true
write_standard_images = true
export_phase_handoff = false

[verification]
mode = "standard"
block_on_failed_checks = true
gradient_check = false
taylor_check = false
exact_grid_replay = false
artifact_validation = true

[export]
enabled = false
profile = "neutral_csv_v1"
include_unwrapped_phase = true
include_group_delay = true
