id = "smf28_longfiber_phase_poc"
description = "Experimental long-fiber front-layer config: phase-only SMF-28 Raman run intended for burst execution planning."
maturity = "experimental"
output_root = "results/raman/longfiber"
output_tag = "smf28_longfiber_phase_poc"
save_prefix_basename = "opt"

[problem]
regime = "long_fiber"
preset = "SMF28"
L_fiber = 100.0
P_cont = 0.05
beta_order = 3
Nt = 32768
time_window = 269.0
grid_policy = "exact"
pulse_fwhm = 1.85e-13
pulse_rep_rate = 8.05e7
pulse_shape = "sech_sq"
raman_threshold = -5.0

[controls]
variables = ["phase"]
parameterization = "full_grid"
initialization = "zero"
policy = "fresh"

[objective]
kind = "raman_band"
log_cost = true

[[objective.regularizer]]
name = "gdd"
lambda = "auto"

[[objective.regularizer]]
name = "boundary"
lambda = 1.0

[solver]
kind = "lbfgs"
max_iter = 25
validate_gradient = false
store_trace = true

[artifacts]
bundle = "standard"
save_payload = true
save_sidecar = true
update_manifest = true
write_trust_report = true
write_standard_images = true
export_phase_handoff = false

[verification]
mode = "burst_required"
block_on_failed_checks = true
gradient_check = false
taylor_check = false
exact_grid_replay = false
artifact_validation = true

[export]
enabled = false
profile = "neutral_csv_v1"
include_unwrapped_phase = true
include_group_delay = true
