id = "smf28_L2m_P0p2W"
description = "Default approved canonical single-mode SMF-28 run for lab usage."
output_tag = "smf28_L2m_P0p2W"
save_prefix_basename = "opt"

[run]
fiber_preset = "SMF28"
fiber_name = "SMF-28"
